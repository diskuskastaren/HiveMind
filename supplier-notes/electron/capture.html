<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<script>
(function () {
  'use strict';

  let recorder = null;
  let audioCtx = null;
  let capturedStream = null;
  let micStream = null;
  let vizRafId = null;
  let outputStream = null;
  let recorderMimeType = 'audio/webm';
  let currentChunks = [];
  let pendingMode = 'idle';

  function stopTracksAndContext() {
    if (capturedStream) capturedStream.getTracks().forEach(t => t.stop());
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close().catch(() => {});
    capturedStream = null;
    micStream = null;
    audioCtx = null;
    outputStream = null;
  }

  function startRecorder() {
    if (!outputStream) throw new Error('No capture stream available');
    currentChunks = [];
    recorder = new MediaRecorder(outputStream, { mimeType: recorderMimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) currentChunks.push(e.data);
    };
    recorder.onstop = async () => {
      const blob = new Blob(currentChunks, { type: recorderMimeType });
      currentChunks = [];
      if (blob.size > 0) {
        const buf = await blob.arrayBuffer();
        window.captureIpc.sendChunk(buf);
      }

      if (pendingMode === 'flush') {
        pendingMode = 'idle';
        startRecorder();
        window.captureIpc.sendFlushed();
        return;
      }

      if (pendingMode === 'stop') {
        pendingMode = 'idle';
        stopTracksAndContext();
        window.captureIpc.sendStopped();
      }
    };
    recorder.start();
  }

  function finishRecorder(mode) {
    if (!recorder || recorder.state === 'inactive') {
      if (mode === 'flush') window.captureIpc.sendFlushed();
      if (mode === 'stop') {
        stopTracksAndContext();
        window.captureIpc.sendStopped();
      }
      return;
    }

    pendingMode = mode;
    recorder.stop();
  }

  window.captureIpc.onFlush(() => {
    finishRecorder('flush');
  });

  // Register stop handler immediately so it is always ready.
  window.captureIpc.onStop(() => {
    if (vizRafId) { cancelAnimationFrame(vizRafId); vizRafId = null; }
    finishRecorder('stop');
  });

  // Start capture when the main process sends the desktop source ID.
  window.captureIpc.onStart(async (sourceId) => {
    try {
      // Request desktop audio + a 1×1 video track.
      // Chromium requires a video track to grant system audio; we stop it immediately.
      capturedStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          mandatory: {
            chromeMediaSource:   'desktop',
            chromeMediaSourceId: sourceId,
          },
        },
        video: {
          mandatory: {
            chromeMediaSource:   'desktop',
            chromeMediaSourceId: sourceId,
            maxWidth:  1,
            maxHeight: 1,
          },
        },
      });

      // Drop the video track right away — we only needed it to unlock audio.
      capturedStream.getVideoTracks().forEach(t => t.stop());

      // Mix system audio + microphone into a single destination stream.
      audioCtx = new AudioContext();
      const dest     = audioCtx.createMediaStreamDestination();
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.75;

      const sysAudio  = new MediaStream(capturedStream.getAudioTracks());
      const sysSource = audioCtx.createMediaStreamSource(sysAudio);
      sysSource.connect(dest);
      sysSource.connect(analyser);

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        const micSource = audioCtx.createMediaStreamSource(micStream);
        micSource.connect(dest);
        micSource.connect(analyser);
      } catch {
        // Mic unavailable — record system audio only.
      }

      // Forward frequency data to the main renderer at ~30 fps for the visualizer.
      const levelsData   = new Uint8Array(analyser.frequencyBinCount);
      let lastLevelSend  = 0;
      function sendLevels() {
        vizRafId = requestAnimationFrame(sendLevels);
        const now = performance.now();
        if (now - lastLevelSend < 33) return;
        lastLevelSend = now;
        analyser.getByteFrequencyData(levelsData);
        window.captureIpc.sendLevels(Array.from(levelsData));
      }
      sendLevels();

      recorderMimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';
      outputStream = dest.stream;
      startRecorder();
      window.captureIpc.sendReady(recorderMimeType);
    } catch (err) {
      window.captureIpc.sendError(err?.message ?? String(err));
    }
  });
}());
</script>
</body>
</html>
