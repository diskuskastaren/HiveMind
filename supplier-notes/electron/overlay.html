<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams Meeting Detected</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .wrapper {
      padding: 40px 40px 40px 40px;
    }

    .pill {
      background: #1c1c1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55), 0 2px 8px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      -webkit-app-region: drag;
    }

    /* ── Top row ── */
    .top-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px 10px 12px;
    }

    .app-icon {
      width: 36px;
      height: 36px;
      background: #6366f1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .app-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .text {
      flex: 1;
      min-width: 0;
      -webkit-app-region: no-drag;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #f4f4f5;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      font-size: 11px;
      color: #71717a;
      margin-top: 1px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .record-btn {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 100px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }

    .record-btn:hover {
      background: #818cf8;
    }

    .dismiss-btn {
      background: rgba(255, 255, 255, 0.06);
      border: none;
      color: #71717a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      padding: 0;
      -webkit-app-region: no-drag;
    }

    .dismiss-btn:hover {
      color: #d4d4d8;
      background: rgba(255, 255, 255, 0.12);
    }

    .dismiss-btn svg {
      width: 12px;
      height: 12px;
    }

    /* ── Consent row (hidden by default, expands on hover) ── */
    .consent-row {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 12px;
      -webkit-app-region: no-drag;
    }

    .pill:hover .consent-row {
      max-height: 60px;
      padding: 0 12px 11px 12px;
    }

    .consent-text {
      font-size: 11px;
      color: #52525b;
      line-height: 1.5;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 9px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="pill">
      <div class="top-row">
        <div class="app-icon">
          <!-- Mic icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6 9a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93V20H8v2h8v-2h-3v-2.07A8 8 0 0 0 20 10h-2z"/>
          </svg>
        </div>

        <div class="text">
          <div class="title">Start Meeting Transcription</div>
          <div class="subtitle">Choose which note to record in</div>
        </div>

        <div class="actions">
          <button class="record-btn" id="recordBtn">Start Recording</button>
          <button class="dismiss-btn" id="dismissBtn" title="Dismiss">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="consent-row">
        <p class="consent-text">
          By starting, you confirm that you will collect consent from all meeting participants before transcribing.
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('recordBtn').addEventListener('click', () => {
      window.electronOverlay.startRecording();
    });

    document.getElementById('dismissBtn').addEventListener('click', () => {
      window.electronOverlay.dismiss();
    });
  </script>
</body>
</html>
